<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea 2.1</title>

    <head>

        <style>
            :root {
                --bg-color: #0a0a0a;
                --card-width: 250px;
                --card-height: 380px;
                --gap: 20px;
                --total-cards: 5;
                --duration: 20s;
            }

            body {
                background-color: var(--bg-color);
                margin: 0;
                display: flex;
                flex-direction: column;
                /* Organiza header y carrusel verticalmente */
                justify-content: center;
                /* Centra el carrusel verticalmente */
                align-items: center;
                min-height: 100vh;
                overflow: hidden;
                font-family: sans-serif;
            }

            /* HEADER: Pegado arriba */
            header {
                position: fixed;
                /* Lo fija a la ventana */
                top: 0;
                left: 0;
                width: 100%;
                background: white;
                display: flex;
                justify-content: center;
                border-bottom: 2px solid black;
                padding: 10px 0;
                z-index: 100;
                /* Asegura que esté por encima de las imágenes al pasar el carrusel */
            }

            header img {
                height: 60px;
                /* Ajustado ligeramente para que no ocupe demasiado */
                object-fit: contain;
            }

            /* CARRUSEL: Centrado */
            .carousel-viewport {
                width: 100%;
                overflow: hidden;
                padding: 50px 0;
                /* Máscara para bordes suaves */
                mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
                -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
                margin-top: 80px;
                /* Evita que el header tape el carrusel en pantallas pequeñas */
            }

            .carousel-track {
                display: flex;
                width: calc((var(--card-width) + var(--gap)) * (var(--total-cards) * 2));
                animation: scroll var(--duration) linear infinite;
            }

            .carousel-track:hover {
                animation-play-state: paused;
            }

            .card {
                width: var(--card-width);
                height: var(--card-height);
                margin-right: var(--gap);
                flex-shrink: 0;
                border-radius: 15px;
                overflow: hidden;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
                transition: transform 0.3s ease, box-shadow 0.3s ease;
                cursor: pointer;
            }

            .card:hover {
                transform: scale(1.1);
                box-shadow: 0 15px 30px rgba(229, 9, 20, 0.4);
                z-index: 10;
            }

            .card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

            @keyframes scroll {
                0% {
                    transform: translateX(0);
                }

                100% {
                    transform: translateX(calc(-1 * (var(--card-width) + var(--gap)) * var(--total-cards)));
                }
            }
        </style>
    </head>

<body>

    <header>
        <img src="imagenes/with_padding.png" alt="Logo">
    </header>

    <div class="carousel-viewport">
        <div class="carousel-track">
            <div class="card"><img src="Origenes.jpg" alt="Pelicula 1"></div>
            <div class="card"><img src="F&F.jpg" alt="Pelicula 2"></div>
            <div class="card"><img src="imagenes/turning-red.jpg" alt="Pelicula 3"></div>
            <div class="card"><img src="Frankenstein.jpg" alt="Pelicula 4"></div>
            <div class="card"><img src="La_asistenta.jpg" alt="Pelicula 5"></div>

            <div class="card"><img src="Origenes.jpg" alt="Pelicula 1"></div>
            <div class="card"><img src="F&F.jpg" alt="Pelicula 2"></div>
            <div class="card"><img src="imagenes/turning-red.jpg" alt="Pelicula 3"></div>
            <div class="card"><img src="Frankenstein.jpg" alt="Pelicula 4"></div>
            <div class="card"><img src="La_asistenta.jpg" alt="Pelicula 5"></div>
        </div>
    </div>

</body>

</html>
