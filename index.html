<head>
    <meta charset="UTF-8">

    <title>Cata Movie</title>

    <head>

        <style>
            :root {
                --bg-color: #0a0a0a;
                --card-width: 250px;
                --card-height: 380px;
                --gap: 20px;
                --total-cards: 6;
                --duration: 20s;
            }

            body {
                background-color: var(--bg-color);
                margin: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                overflow: hidden;
                font-family: sans-serif;
            }

            header {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                background: rgb(228, 228, 228);
                display: flex;
                justify-content: center;
                border-bottom: 2px solid black;
                padding: 10px 0;
                z-index: 100;
            }

            header img {
                height: 80px;
                object-fit: contain;
                border-radius: 10px;
            }

            .nav-bar {
                position: fixed;
                top: 100px;
                left: 0;
                width: 100%;
                background: linear-gradient(to bottom, #8b0000 0%, #e50914 50%, #b20710 100%);
                display: flex;
                justify-content: center;
                padding: 12px 0;
                z-index: 1000;

                box-shadow:
                    0 4px 15px rgba(0, 0, 0, 0.6),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3),
                    
                    inset 0 -3px 0 rgba(0, 0, 0, 0.2);
                
                
            }

            .nav-bar a {
                color: white;
                text-decoration: none;
                font-weight: bold;
                text-transform: uppercase;
                padding: 8px 25px;
                margin: 0 15px;
                border: 1px solid rgba(255, 255, 255, 0.4);
                border-radius: 5px;
                background: rgba(0, 0, 0, 0.1);
                transition: all 0.3s ease;
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            }

            .nav-bar a:hover {
                background-color: white;
                color: #e50914;
                box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
                transform: translateY(-1px);
            }

            .carousel-viewport {
                width: 80%;
                overflow: hidden;
                padding: 50px 0;
                -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
                mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
                margin-top: 80px;
                position: relative;

            }

            .carousel-track {
                display: flex;
                width: calc((var(--card-width) + var(--gap)) * (var(--total-cards) * 3));
                animation: scroll var(--duration) linear infinite;
            }

            .carousel-track:hover {
                animation-play-state: paused;
            }

            .card {
                width: var(--card-width);
                height: var(--card-height);
                margin-right: var(--gap);
                flex-shrink: 0;
                border-radius: 15px;
                overflow: hidden;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
                transition: transform 0.3s ease, box-shadow 0.3s ease;
                cursor: pointer;
            }

            .card:hover {
                transform: scale(1.1);
                box-shadow: 0 15px 30px rgba(229, 9, 20, 0.4);
                z-index: 10;
            }

            .card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            @keyframes scroll {
                0% {
                    transform: translateX(0);
                }

                100% {
                    transform: translateX(calc(-1 * (var(--card-width) + var(--gap)) * var(--total-cards)));
                }
            }
        </style>
    </head>
